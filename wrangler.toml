name = "emoji-mahjong"
main = "worker/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "dist"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "ROOM_REGISTRY"
class_name = "RoomRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RoomRegistry"]
